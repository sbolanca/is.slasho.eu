<sim:tmpl name="conf_list">
						<tr>
							<td align="right">{CONF_LABEL}</td>
							<td><textarea name="{CONF_NAME}" rows="{CONF_ROWS}" cols="{CONF_COLS}" wrap="OFF" style="overflow:scroll;">{CONF_VALUE}</textarea>
							</td>
							<td><img src="/images/help.gif" onMouseOver="showHelp('{CONF_DESCRIPTION}',event);" onMouseOut="hideHelp();"/></td>
						</tr>												
					</sim:tmpl>
