<sim:tmpl name="fld_mlt">
						<tr>
							<td align="right">Opcije</td>
							<td><textarea name="options" rows="10" cols="30" wrap="OFF" style="overflow:scroll;">{FLD_OPTIONS}</textarea></td>
						</tr>
						<tr>
							<td align="right">Prefiks:</td>
							<td><input type="text" name="prefix" value="{FLD_PREFIX}" size="10"></td>
						</tr>
						<tr>
							<td align="right">Sufix:</td>
							<td><input type="text" name="sufix" value="{FLD_SUFIX}" size="10"></td>
						</tr>	
						<tr>
							<td align="right">Raspored opcija:</td>
							<td><input type="radio" name="size" value="0" {CKS0}/> horizontalno --- <input type="radio" name="size" value="1" {CKS1}/> vertikalno</td>
						</tr>
																					
</sim:tmpl>
