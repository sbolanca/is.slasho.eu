<sim:tmpl name="opt_content">
					<sim:tmpl name="opt_content_content">	
					<h1>{ROW_TITLE} - [Metatags]</h1>
					<form id="contentMetaForm" name="contentMetaForm" action="index.php" method="POST">
						<input type="hidden" name="opt" value="content" />
						<input type="hidden" name="act" value="savemeta" />
						<input type="hidden" name="id" value="{ROW_ID}" />
						<input type="hidden" name="langID" value="{ROW_LANGID}" />
						<input type="hidden" name="galleryID" value="{ROW_GALLERYID}" />
						Opis (metatag: description):<br/>
						<textarea name="description" style="width:400px; height:100px;">{ROW_DESCRIPTION}</textarea><br/>
						Ključne riječi (metatag: keywords):<br/>
						<textarea name="keywords" id="cont" style="width:400px; height:50px;">{ROW_KEYWORDS}</textarea><br/>
						<input type="button" class="button" value="submit" onClick="saveMeta();" />
					</form>
					</sim:tmpl>							
</sim:tmpl>
