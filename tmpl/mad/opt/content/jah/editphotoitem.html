<sim:tmpl name="opt_content">
					<sim:tmpl name="opt_content_photo">	
					<form id="contentPhotoItemForm" name="contentPhotoItemForm" action="index.php" method="POST">
						<input type="hidden" name="opt" value="content" />
						<input type="hidden" name="act" value="savephotoitem" />
						<input type="hidden" name="id" value="{ROW_ID}" />
						<input type="hidden" name="langID" value="{ROW_LANGID}" />
						<table id="_tmpimgdescription" style="width:200px;">
						  <tr>
							<td align="right">{_A_CONT_G_TITLE}:</td>
							<td><input type="text" name="title" value="{ROW_TITLE}" />
							</td>
						  </tr>
						  <tr>
							<td  align="right">{_A_CONT_G_DESC}:</td>
							<td><textarea name="description" style="width:250px; height:50px;">{ROW_DESCRIPTION}</textarea><br/></td>
						  </tr>
						   <tr>
							<td ></td>
							<td><input type="button" class="button" value="{_A_CONT_G_SUBMIT}" onClick="activateCMCommandPOST('content','savephotoitem','contentPhotoItemForm');" /></td>
						  </tr>
						</table>
					</form>
					</sim:tmpl>							
</sim:tmpl>
