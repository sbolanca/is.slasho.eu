<sim:tmpl name="opt_content">
					<sim:tmpl name="opt_content_content">	
					<form id="contentTypeForm" name="contentTypeForm" action="index.php" method="POST">
						<input type="hidden" name="opt" value="content" />
						<input type="hidden" name="act" value="savetype" />
						<input type="hidden" name="id" value="{ROW_ID}" />
						<table width="150"><tr>
						<td>{_A_CONT_T_STYPE}:</td>
						<td><SELECT name="type">
							<option value="" {S_N}>{_A_CONT_T_NORMAL}</option>
							<option value="g" {S_G}>{_A_CONT_T_GALLERY}</option>
						</SELECT></td>
						</tr></table>
						<input type="button" class="button" value="{_A_CONT_T_SUBMIT}" onClick="activateCMCommandPOST('content','savetype','contentTypeForm');" />
					</form>
					</sim:tmpl>							
</sim:tmpl>
