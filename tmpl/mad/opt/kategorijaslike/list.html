<sim:tmpl name="opt_kategorijaslike">
<table width="100%" height="100%" cellpadding="0" cellspacing="0">
<tr>
<td id="lijevo" class="panel">
		{ACCORDIAN}
	</td>
	<td>
		<table width="100%" height="100%" cellpadding="0" cellspacing="0">
			<tr>
				<td class="panel h1">
					<table width="100%"><tr>
					<td><h1 ><span id="title">{TITLE}</span> <span style="float:right;" class="sml"><input style="font-size:10px" type="button" value="Dodaj novu kategoriju slike" onClick="aCMC(0,'kategorijaslike','edit','mode=new')"/></span></h1></td>
					
						<td><span class="xls" title="Download Excel" onClick="xls()"/></td>
						
						</tr>
					</table>
				</td>
			</tr>
			<tr><td height="100%" oncontextmenu="cCM(0,'CM_opt_kategorijaslike_TBL',event)"><div id="gridbox" width="100%" height="100%" style="background-color:white;" ></div></td></tr>
			<tr><td class="panel h1">
				<div class="divleft">Pronađeno <strong><span id="cnt">{CNT}</span></strong> zapisa</div>
				<div id="so_content" class="divleft so">{SEARCHOPTIONS}</div>
				<div class="cleaner"></div>
			</td></tr>
		</table>
	</td>
</tr>
</table>
<script>



	tbl_kategorijaslike = new dhtmlXGridObject('gridbox');
	tbl_kategorijaslike.setImagePath("js/codebase/imgs/");
	function Init_tbl_kategorijaslike(cnt) {
		setHeaderTable("tbl_kategorijaslike");
		tbl_kategorijaslike.setInitWidths(setTableCols("tbl_kategorijaslike","W"));
		tbl_kategorijaslike.setColAlign(setTableCols("tbl_kategorijaslike","A"));
		tbl_kategorijaslike.setColTypes(setTableCols("tbl_kategorijaslike","T"));
	   // tbl_arh.enableDragAndDrop(true);
		tbl_kategorijaslike.enableMultiselect(true);
		tbl_kategorijaslike.attachEvent("onRightClick",kategorijaslike_cm);
		tbl_kategorijaslike.attachEvent("onRowSelect",stdRowSelected);
		tbl_kategorijaslike.init();

		loadTable(tbl_kategorijaslike,"opt=kategorijaslike&act=list",cnt,true);
		
	}  
	function kategorijaslike_cm(i,c,e) {doOnTblCM(i,c,e,tbl_kategorijaslike,'CM_opt_kategorijaslike_list'); }	
	Init_tbl_kategorijaslike({CNT});



</script>
			

</sim:tmpl>
