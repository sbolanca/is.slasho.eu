<sim:tmpl name="opt_mail">
					<form id="mailForm" name="mailForm" action="admin.php" method="POST">
						<input type="hidden" name="opt" value="mail" />
						<input type="hidden" name="act" value="save" />
						<input type="hidden" name="html" value="{ROW_HTML}" />
						<input type="hidden" name="id" value="{ROW_ID}" />
						<table class="etbl" style="width:100%">
						<tr>
							<th >Naziv predloška:</th>
							<td><input type="text" name="title" value="{ROW_TITLE}" size="60" />
							
							</td>
						</tr>
						<tr>
							<th >Reply to:</th>
							<td><input id="emfrom" type="text" name="emfrom" value="{ROW_EMFROM}" size="30" />
								<input type="button" value="{MYEMAIL}" onClick="$('#mailForm #emfromname').val('{MYNAME}');$('#mailForm #emfrom').val('{MYEMAIL}')"/>
							</td>
						</tr>
						<tr>
							<th >Naziv pošiljatelja:</th>
							<td><input id="emfromname" type="text" name="emfromname" value="{ROW_EMFROMNAME}" size="30" />
							</td>
						</tr>
						<tr>
							<th >Naslov maila:</th>
							<td><input type="text" name="subject" id="subject" value="{ROW_SUBJECT}" size="65" onClick="if(event.ctrlKey) aCMC(0,'mail','userfield','form=mailForm&fld=subject&pos='+this.selectionStart);"/>
							
							</td>
						</tr>
						<tr>
							<th colspan="2" style="text-align:left">Sadržaj mail poruke:</th>
						</tr>
						<tr>
							<td colspan="2"><textarea name="body" id="body" style="width:100%;height:300px" onClick="if(event.ctrlKey) aCMC(0,'mail','userfield','form=mailForm&fld=body&pos='+this.selectionStart);">{ROW_BODY}</textarea></td>
							
						
						</tr>
							<tr>
							<th ><label for="chkhtml">HTML:</label></th>
							<td><input type="checkbox" id="chkhtml" name="html" value="1" {CHKHTML1}/>
							
							</td>
						</tr>
						<tr>
							<td ></td>

						
						<td ><input type="button" class="button" value="SPREMI" onClick="activateCMCommandPOST('mail','save','mailForm');" /></td></tr>
						</table>
					</form>
</sim:tmpl>
