<sim:tmpl name="opt_news">
					<sim:tmpl name="opt_news_gallery">
					<div id="gallery">
						<sim:tmpl name="opt_news_gallery_item">
						<div class="gitem"><img  width="129" src="files/Image/{GROW_IMAGE}" alt="{GROW_TITLE}"/></div>
						</sim:tmpl>
					</div>
					</sim:tmpl>
					<div id="contenttext" class="ctxphoto">
					<sim:tmpl name="opt_news_content">	
					<form id="newsForm" name="newsForm" action="index.php" method="POST" onSubmit="return  submitFCKForm('newsForm','content','cont','news','save');">
						<input type="hidden" name="opt" value="news" />
						<input type="hidden" name="act" value="save" />
						<input type="hidden" name="id" value="{ROW_ID}" />
						<input type="hidden" name="langID" value="{ROW_LANGID}" />
						<input type="hidden" name="galleryID" value="{ROW_GALLERYID}" />
						<input type="text" name="title" value="{ROW_TITLE}" size="50"/><br/>
						<input type="text" name="menu" value="{ROW_MENU}" /> (menu alias)<br/>
						<textarea name="content" id="cont">{ROW_CONTENT}</textarea>
					</form>
					</sim:tmpl>							
					</div>
</sim:tmpl>
