<sim:tmpl name="opt_news">
					<sim:tmpl name="opt_news_content">	
					<form id="newsDateForm" name="newsDateForm" action="index.php" method="POST">
						<input type="hidden" name="opt" value="news" />
						<input type="hidden" name="act" value="savedate" />
						<input type="hidden" name="tf" value="{TF}" />
						<input type="hidden" name="id" value="{ROW_ID}" />
						<input type="hidden" name="langID" value="{ROW_LANGID}" />
						<table id="popupdescription">
						<tr>
							<td align="right">{_A_NEWS_P_START}:</td>
							<td><input type="text" id="start_date" name="start_date" value="{ROW_START_DATE}"/> <img src="images/calendar.gif" onclick="return showCalendar('start_date');" /></td>
						</tr>
						<tr>
							<td align="right">{_A_NEWS_P_END}:</td>
							<td><input type="text" id="end_date" name="end_date" value="{ROW_END_DATE}"/> <img src="images/calendar.gif" onclick="return showCalendar('end_date');" /></td>
						</tr>
						<tr>
							<td align="right">{_A_NEWS_P_PBL}:</td>
							<td><input type="radio" name="published" value="0" {CKP0}/> NE --- <input type="radio" name="published" value="1" {CKP1}/>DA</td>
						</tr>
						<tr>
							<td align="right">{_A_NEWS_P_FPG}:</td>
							<td><input type="radio" name="frontpage" value="0" {CKF0}/> NE --- <input type="radio" name="frontpage" value="1" {CKF1}/>DA</td>
						</tr>
						<tr>
							<td align="right">{_A_NEWS_P_ACT}:</td>
							<td><input type="radio" name="listing" value="0" {CKL0} /> NE --- <input type="radio" name="listing" value="1" {CKL1} />DA</td>
						</tr>
						<tr>
							<td align="right">{_A_NEWS_P_ARH}:</td>
							<td><input type="radio" name="archive" value="0" {CKA0} /> NE --- <input type="radio" name="archive" value="1" {CKA1} />DA</td>
						</tr>
						<tr>
							<td align="right"></td>
							<td><input type="button" class="button" value="{_A_NEWS_P_SUBMIT}" onClick="activateCMCommandPOST('news','savedate','newsDateForm');" /></td>
						</tr>
						</table>
						
					</form>
					</sim:tmpl>							
</sim:tmpl>
