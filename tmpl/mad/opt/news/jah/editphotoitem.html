<sim:tmpl name="opt_news">
					<sim:tmpl name="opt_news_photo">	
					<form id="newsPhotoItemForm" name="newsPhotoItemForm" action="index.php" method="POST">
						<input type="hidden" name="opt" value="news" />
						<input type="hidden" name="act" value="savephotoitem" />
						<input type="hidden" name="id" value="{ROW_ID}" />
						<input type="hidden" name="langID" value="{ROW_LANGID}" />
						<table id="_tmpimgdescription" style="width:200px;">
						  <tr>
							<td align="right">{_A_NEWS_G_TITLE}:</td>
							<td><input type="text" name="title" value="{ROW_TITLE}" />
							</td>
						  </tr>
						  <tr>
							<td  align="right">{_A_NEWS_G_DESC}:</td>
							<td><textarea name="description" style="width:250px; height:50px;">{ROW_DESCRIPTION}</textarea><br/></td>
						  </tr>
						   <tr>
							<td ></td>
							<td><input type="button" class="button" value="{_A_NEWS_G_SUBMIT}" onClick="activateCMCommandPOST('news','savephotoitem','newsPhotoItemForm');" /></td>
						  </tr>
						</table>
					</form>
					</sim:tmpl>							
</sim:tmpl>
