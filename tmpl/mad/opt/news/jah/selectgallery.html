<sim:tmpl name="opt_news">
					<sim:tmpl name="opt_news_gallery">	
					<form id="newsGalleryForm" name="newsGalleryForm" action="index.php" method="POST">
						<input type="hidden" name="opt" value="news" />
						<input type="hidden" name="act" value="setgallery" />
						<input type="hidden" name="id" value="{CONTENTID}" />
						<div id="_tmpgallerylist" style="width:320px;">
						<div style="float:left; width:180px;">
						<select name="galleryID" size="20" style="width:180px;"
							onChange="g_Send('opt=news&act=getgalleryexample&id='+document.newsGalleryForm.galleryID.options[document.newsGalleryForm.galleryID.selectedIndex].value);">
							<sim:tmpl name="opt_news_gallery_option">	
							<option value="{ROW_ID}" {ROW_SELECTED}>{ROW_TITLE}</option>
							</sim:tmpl>		
							</select>
							<input type="button" class="button" value="submit" onClick="activateCMCommandPOST('news','setgallery','newsGalleryForm');" /> 		
						</div>
						<div id="_galleryexample" style="width:130px; height:250px; float:right; overflow:auto;" >
							</div>
						
						</div>
						
					</form>
					</sim:tmpl>							
</sim:tmpl>
