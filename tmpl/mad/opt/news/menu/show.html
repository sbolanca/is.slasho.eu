<sim:tmpl name="opt_news_menu">
				<table>
				<tr>
				<td colspan="2">Tip stranice:</td></tr>
					<tr><td align="right">
					<input id="listnewsitemsradiobox" type="radio" name="mact" value="list" {SELL} onClick="RefreshSelectBox('newscatsslectbox','news','menu_refreshbox','singlenewsitemsradiobox','newsitemsselectbox','sel={SELINDEX}');"/>
					</td>
					<td>Jednostavna lista</td>
					</tr>
					<tr><td align="right">
					<input id="blognewsitemsradiobox" type="radio" name="mact" value="blog" {SELB} onClick="RefreshSelectBox('newscatsslectbox','news','menu_refreshbox','singlenewsitemsradiobox','newsitemsselectbox','sel={SELINDEX}');"/>
					</td>
					<td>Blog sa menijem</td>
					</tr>
					<tr><td align="right">
					<input id="actnewsitemsradiobox" type="radio" name="mact" value="alist" {SELA} onClick="RefreshSelectBox('newscatsslectbox','news','menu_refreshbox','singlenewsitemsradiobox','newsitemsselectbox','sel={SELINDEX}');"/>
					</td>
					<td>Aktualno (zanemari kategoriju)</td>
					</tr>
					<tr><td align="right">
					<input id="singlenewsitemsradiobox" type="radio" name="mact" value="show" {SELS} onClick="RefreshSelectBox('newscatsslectbox','news','menu_refreshbox','singlenewsitemsradiobox','newsitemsselectbox','sel={SELINDEX}');"/>
					</td>
					<td>Pojedinačni članak</td>
					</tr>
					<tr>
					<td>Odaberi kategoriju:</td>
					<td>
					<select name="dbindex" size="1" id="newscatsslectbox" onChange="RefreshSelectBox('newscatsslectbox','news','menu_refreshbox','singlenewsitemsradiobox','newsitemsselectbox','sel={SELINDEX}');">
						<option value="0">[--nova kategorija--]</option>					
					<sim:tmpl name="opt_news_menu_item"><option value="{IT_ID}" {IT_SELECTED}>{IT_TITLE}</option>
					</sim:tmpl>
					</select>
					<input type="hidden" name="type" value="show"/>
					</td>
					</tr>
					<tr id="trnewsselectitem">
					<td >Odaberi članak:</td>
					<td>
					<select name="index_item" size="1" id="newsitemsselectbox">		
					<sim:tmpl name="opt_news_menu_nitem"><option value="{ITN_ID}" {ITN_SELECTED}>{ITN_TITLE}</option></sim:tmpl>
					</select>
					<input type="hidden" name="type" value="show"/>
					</td>
					</tr>
					</table>		
</sim:tmpl>
