<sim:tmpl name="opt_ponuda">
<table width="100%" height="100%" cellpadding="0" cellspacing="0">
<tr>
<td id="lijevo" class="panel">
		{ACCORDIAN}
	</td>
	<td>
		<table width="100%" height="100%" cellpadding="0" cellspacing="0">
			<tr>
				<td class="panel h1">
					<table width="100%"><tr>
					<td><h1 ><span id="title">{TITLE}</span> <span style="float:right;" class="sml">
						<input style="font-size:10px" type="button" value="Dodaj novu ponudu" onClick="aCMC(0,'ponuda','edit','mode=new')"/>
						<input style="font-size:10px" type="button" value="KAZALO" onClick="$('#kazalo').dialog()"/>
						<span class="xls" title="Download Excel" onClick="xls()"/>
						</span></h1></td>
					
						<td><div id="kazalo" style="display:none;padding:10px" title="Kazalo">
								<table width="100%">
								<tr><td width="200" class="brd own" align="center">u pripremi</td></tr>
								<tr><td width="200" class="brd my" align="center">provedeno</td></tr>
								<tr><td width="200" class="brd mysukob" align="center">arhivirano</td></tr>		
								<tr><td width="200" class="brd sukob" align="center">problem</td></tr>		
								</table>
								
							</div></td>
						
						</tr>
					</table>
				</td>
			</tr>
			<tr><td height="100%" oncontextmenu="cCM(0,'CM_opt_ponuda_TBL',event)"><div id="gridbox" width="100%" height="100%" style="background-color:white;" ></div></td></tr>
			<tr><td class="panel h1">
				<div class="divleft">Pronađeno <strong><span id="cnt">{CNT}</span></strong> zapisa</div>
				<div id="so_content" class="divleft so">{SEARCHOPTIONS}</div>
				<div class="cleaner"></div>
			</td></tr>
		</table>
	</td>
</tr>
</table>
<script>



	tbl_ponuda = new dhtmlXGridObject('gridbox');
	tbl_ponuda.setImagePath("js/codebase/imgs/");
	function Init_tbl_ponuda(cnt) {
		setHeaderTable("tbl_ponuda");
		tbl_ponuda.setInitWidths(setTableCols("tbl_ponuda","W"));
		tbl_ponuda.setColAlign(setTableCols("tbl_ponuda","A"));
		tbl_ponuda.setColTypes(setTableCols("tbl_ponuda","T"));
	   // tbl_arh.enableDragAndDrop(true);
		tbl_ponuda.enableMultiselect(true);
		tbl_ponuda.attachEvent("onRightClick",ponuda_cm);
		tbl_ponuda.attachEvent("onRowSelect",stdRowSelected);
		tbl_ponuda.init();

		loadTable(tbl_ponuda,"opt=ponuda&act=list",cnt,true);
		
	}  
	function ponuda_cm(i,c,e) {doOnTblCM(i,c,e,tbl_ponuda,'CM_opt_ponuda_list'); }	
	Init_tbl_ponuda({CNT});



</script>
			

</sim:tmpl>
