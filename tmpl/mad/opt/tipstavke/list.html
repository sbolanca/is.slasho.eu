<sim:tmpl name="opt_tipstavke">
<table width="100%" height="100%" cellpadding="0" cellspacing="0">
<tr>
<td id="lijevo" class="panel">
		{ACCORDIAN}
	</td>
	<td>
		<table width="100%" height="100%" cellpadding="0" cellspacing="0">
			<tr>
				<td class="panel h1">
					<table width="100%"><tr>
					<td><h1 ><span id="title">{TITLE}</span><span style="float:right;" class="sml"><input style="font-size:10px" type="button" value="Dodaj novi tip stavke" onClick="aCMC(0,'tipstavke','edit','mode=new')"/></span></h1></td>
					
						<td><span class="xls" title="Download Excel" onClick="xls()"/></td>
						
						</tr>
					</table>
				</td>
			</tr>
			<tr><td height="100%" oncontextmenu="cCM(0,'CM_opt_tipstavke_TBL',event)"><div id="gridbox" width="100%" height="100%" style="background-color:white;" ></div></td></tr>
			<tr><td class="panel h1">
				<div class="divleft">Pronađeno <strong><span id="cnt">{CNT}</span></strong> zapisa</div>
				<div id="so_content" class="divleft so">{SEARCHOPTIONS}</div>
				<div class="cleaner"></div>
			</td></tr>
		</table>
	</td>
</tr>
</table>
<script>



	tbl_tipstavke = new dhtmlXGridObject('gridbox');
	tbl_tipstavke.setImagePath("js/codebase/imgs/");
	function Init_tbl_tipstavke(cnt) {
		setHeaderTable("tbl_tipstavke");
		tbl_tipstavke.setInitWidths(setTableCols("tbl_tipstavke","W"));
		tbl_tipstavke.setColAlign(setTableCols("tbl_tipstavke","A"));
		tbl_tipstavke.setColTypes(setTableCols("tbl_tipstavke","T"));
	   // tbl_arh.enableDragAndDrop(true);
		tbl_tipstavke.enableMultiselect(true);
		tbl_tipstavke.attachEvent("onRightClick",tipstavke_cm);
		tbl_tipstavke.attachEvent("onRowSelect",stdRowSelected);
		tbl_tipstavke.init();

		loadTable(tbl_tipstavke,"opt=tipstavke&act=list",cnt,true);
		
	}  
	function tipstavke_cm(i,c,e) {doOnTblCM(i,c,e,tbl_tipstavke,'CM_opt_tipstavke_list'); }	
	Init_tbl_tipstavke({CNT});



</script>
			

</sim:tmpl>
