<sim:tmpl name="opt_user">

	
	<table width="100%" class="itbl" cellpadding="0" cellspacing="0"  style="border:10px solid #eee;">
		<tr>
			<td class="sn">E-pošta:</td>
			<td class="sv">{ROW_EMAIL}</td>
		</tr>
		<tr>
			<td class="sn">Mobitel:</td>
			<td class="sv">{ROW_MOBITEL}</td>
		</tr>
		<tr>
			<td class="sn">Telefon:</td>
			<td class="sv">{ROW_TELEFON}</td>
		</tr>
		<tr title="Ako su adresa boravišta i prebivališta različite, prednost ima adresa boravišta">
			<td class="sn">Adresa boravišta:</td>
			<td class="sv">
				<div>{ROW_ADRESA_BORAVKA}</div>
				<div>{ROW_MJESTO_BORAVKA}</div>
				<div>{ROW_DRZAVA_B}</div>
			</td>
		</tr>
		<tr>
			<td class="sn">Adresa za poštu:</td>
			<td class="sv">
				<div>{ROW_ADRESA_ZA_POSTU}</div>
				<div>{ROW_MJESTO_ZA_POSTU}</div>
				<div>{ROW_DRZAVA_P}</div>
			</td>
		</tr>
		
	</table>
	


       
			
</sim:tmpl>
