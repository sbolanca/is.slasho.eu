<sim:tmpl name="opt_user">
<style>
.ovr:hover {
	background-color:#ffd;
}
</style>
<table width="100%" height="100%" cellpadding="0" cellspacing="0">
<tr>
<td id="lijevo" class="panel">
		{ACCORDIAN}
	</td>
	<td>
		<table width="100%" height="100%" cellpadding="0" cellspacing="0">
			<tr>
				<td class="panel h1">
					<table width="100%"><tr>
					<td><h1 ><span id="title">{TITLE}</span></h1></td>
					<td  align="right">
							<input type="button" value="KAZALO" onClick="$('#kazalo').dialog()"/>
					<span class="xls" title="Download Excel" onClick="xls()"/>
					
					<div id="kazalo" style="display:none;padding:10px" title="Kazalo">
							<table width="100%">
							<td width="200" class="brd bgwhite grey" align="center">neaktiviran</td></tr>
							
							</table>
							</div>
					</td>
				</table></td>
			</tr>
			
			<tr><td height="100%" oncontextmenu="cCM(0,'CM_opt_user_TBL',event)"><div id="gridbox" width="100%" height="100%" style="background-color:white;" ></div></td></tr>
			<tr><td class="panel h1">
				<div class="divleft">Pronađeno <strong><span id="cnt">{CNT}</span></strong> zapisa</div>
				<div id="so_content" class="divleft so">{SEARCHOPTIONS}</div>
				<div class="cleaner"></div>
			</td></tr>
		</table>
	</td>
</tr>
</table>
<script>



	tbl_user = new dhtmlXGridObject('gridbox');
	tbl_user.setImagePath("js/codebase/imgs/");
	function Init_tbl_user(cnt) {
		setHeaderTable("tbl_user");
		tbl_user.setInitWidths(setTableCols("tbl_user","W"));
		tbl_user.setColAlign(setTableCols("tbl_user","A"));
		tbl_user.setColTypes(setTableCols("tbl_user","T"));
	   // tbl_arh.enableDragAndDrop(true);
		tbl_user.enableMultiselect(true);
		tbl_user.attachEvent("onRightClick",user_cm);
		tbl_user.attachEvent("onRowSelect",stdRowSelected);
		tbl_user.init();
		loadTable(tbl_user,"opt=user&act=list&pagetype={PAGETYPE}",cnt,true);
		
	}  
	function user_cm(i,c,e) {doOnTblCM(i,c,e,tbl_user,'CM_opt_user'); }	
	Init_tbl_user({CNT});



</script>
			

</sim:tmpl>
